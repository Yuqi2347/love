server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: campus-love

  datasource:
    url: jdbc:mysql://localhost:3306/campus_love?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:campus123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:campusLoveSecretKeyForJwtTokenGeneration2026MustBeLongEnough256Bits!!}
    access-token-expiration: 7200000    # 2 hours
    refresh-token-expiration: 604800000 # 7 days
  upload:
    path: ./uploads/
    max-size: 10485760  # 10MB
  follow:
    daily-chat-limit: 5
    daily-invite-limit: 3

# AI 配置（OpenAI 兼容接口：智谱 GLM / DeepSeek / OpenAI 等均可）
ai:
  api-key: ${AI_API_KEY:52876445a3f34e39a4c32de762eb8c94.LbYMRl3pM7EzO8Vq}
  base-url: ${AI_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  model: ${AI_MODEL:glm-4-plus}
  max-tokens: 1000
  yuanfen-cooldown-hours: 0  # 缘分解析冷却时间（小时），0=无限制，生产环境建议设为1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
