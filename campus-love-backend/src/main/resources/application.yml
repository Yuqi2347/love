server:
  port: 8080
  address: 0.0.0.0   # 监听所有网卡，支持局域网/外网访问（默认仅 localhost）
  servlet:
    context-path: /api

spring:
  application:
    name: campus-love

  datasource:
    url: jdbc:mysql://localhost:3306/campus_love?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:campus123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  # 邮件配置（用于注册验证码，发件人必须与认证邮箱一致）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:1553304293@qq.com}
    password: ${MAIL_PASSWORD:vwvybmuifperbafg}
    from: ${MAIL_USERNAME:1553304293@qq.com}
    properties:
      mail.smtp.ssl.enable: true
      mail.smtp.auth: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:campusLoveSecretKeyForJwtTokenGeneration2026MustBeLongEnough256Bits!!}
    access-token-expiration: 7200000    # 2 hours
    refresh-token-expiration: 604800000 # 7 days
  upload:
    # 跨平台绝对路径：Windows/Linux 均可用。可通过 APP_UPLOAD_PATH 覆盖（如 /var/www/uploads/）
    path: ${APP_UPLOAD_PATH:${user.home}/campus-love/uploads/}
    max-size: 10485760  # 10MB
  follow:
    daily-chat-limit: 5
    daily-invite-limit: 3

# AI 配置（通义千问 Qwen，OpenAI 兼容接口）
ai:
  api-key: ${AI_API_KEY:sk-6d110762b8914167b80ba848e3166bc0}  # 请填写你的 DashScope API Key
  # qwen3.5-flash 需用 compatible-mode；原生 api/v1 text-generation 不支持该模型
  base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  model: ${AI_MODEL:qwen3-max}
  max-tokens: 1000
  # 缘分解析冷却：-1=永久缓存（一经解析永不重复调用），0=每次调用AI，>0=冷却N小时
  # 调试时设为 0 可强制每次调用 AI，便于排查问题
  yuanfen-cooldown-hours: ${YUANFEN_COOLDOWN:-1}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
