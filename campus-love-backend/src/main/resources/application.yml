server:
  port: ${SERVER_PORT:8082}
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: /api

spring:
  application:
    name: campus-love

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_love?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}

  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    properties:
      mail.smtp.ssl.enable: true
      mail.smtp.auth: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:}
    # 默认均为 7 天（毫秒）。前端目前仅用 access_token 请求头，未走 refresh 接口，故 access 需与「一周免登」一致。
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:604800000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  upload:
    path: ${APP_UPLOAD_PATH:${user.home}/campus-love/uploads/}
    max-size: 52428800
  follow:
    daily-chat-limit: 5
    daily-invite-limit: 3
  security:
    enforce-secrets: ${APP_ENFORCE_SECRETS:true}
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5179,http://127.0.0.1:5179,http://localhost:5174,http://127.0.0.1:5174}
    ws-allowed-origins: ${APP_WS_ALLOWED_ORIGINS:http://localhost:5179,http://127.0.0.1:5179,http://localhost:5174,http://127.0.0.1:5174}

ai:
  api-key: ${AI_API_KEY:}
  base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  model: ${AI_MODEL:qwen3-max}
  max-tokens: ${AI_MAX_TOKENS:4096}
  timeout-seconds: ${AI_TIMEOUT:90}
  yuanfen-cooldown-hours: ${YUANFEN_COOLDOWN:0}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
