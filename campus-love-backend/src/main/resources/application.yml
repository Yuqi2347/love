server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: campus-love

  datasource:
    url: jdbc:mysql://localhost:3306/campus_love?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: campus123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: campusLoveSecretKeyForJwtTokenGeneration2026MustBeLongEnough256Bits!!
    access-token-expiration: 7200000    # 2 hours
    refresh-token-expiration: 604800000 # 7 days
  upload:
    path: ./uploads/
    max-size: 10485760  # 10MB
  follow:
    daily-chat-limit: 5
    daily-invite-limit: 3

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
