server:
  port: ${SERVER_PORT:8082}
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: /api

spring:
  config:
    # 允许直接从 .env 读取 key=value（IDE / 不同工作目录启动都尽量兼容）
    import: optional:file:.env[.properties],optional:file:./campus-love-backend/.env[.properties]
  application:
    name: campus-love

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_love?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 2C4G 单实例：池子过大易挤占内存且徒增 DB 连接；与远程库同区时优先调 RTT，而非盲目加大 pool
      maximum-pool-size: ${DB_POOL_MAX:12}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}

  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    properties:
      mail.smtp.ssl.enable: true
      mail.smtp.auth: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    # 切勿使用 StdOutImpl：会把每条 SQL 打到 stdout，日志洪水 + 严重拖慢 I/O（易被误认为「MySQL 在狂刷」）
    # 需要排查 SQL 时：改用 Slf4jImpl，并在 logback / logging.level 对 org.apache.ibatis 或具体 Mapper 开 DEBUG
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:}
    # 默认均为 7 天（毫秒）。前端目前仅用 access_token 请求头，未走 refresh 接口，故 access 需与「一周免登」一致。
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:604800000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  upload:
    path: ${APP_UPLOAD_PATH:${user.home}/campus-love/uploads/}
    max-size: 52428800
  feed:
    # 探索列表短期本地缓存（秒），0=关闭；多节点时每机独立，可配合 Redis 后续统一
    discovery-cache-seconds: ${DISCOVERY_CACHE_SECONDS:20}
    # 为 true 时每条 discovery 打一行分阶段耗时（ms），排查性能时打开
    discovery-timing-log: ${DISCOVERY_TIMING_LOG:false}
  follow:
    daily-chat-limit: 5
    daily-invite-limit: 3
  security:
    enforce-secrets: ${APP_ENFORCE_SECRETS:true}
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5179,http://127.0.0.1:5179,http://localhost:5174,http://127.0.0.1:5174}
    ws-allowed-origins: ${APP_WS_ALLOWED_ORIGINS:http://localhost:5179,http://127.0.0.1:5179,http://localhost:5174,http://127.0.0.1:5174}
  wechat:
    mini-app-id: ${WECHAT_MINI_APP_ID:}
    mini-app-secret: ${WECHAT_MINI_APP_SECRET:}
    code2session-url: ${WECHAT_CODE2SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
    subscribe:
      enabled: ${WECHAT_SUBSCRIBE_ENABLED:false}
      access-token-url: ${WECHAT_ACCESS_TOKEN_URL:https://api.weixin.qq.com/cgi-bin/token}
      send-url: ${WECHAT_SUBSCRIBE_SEND_URL:https://api.weixin.qq.com/cgi-bin/message/subscribe/send}
      tmpl-pair-date-result-ready: ${WECHAT_SUBSCRIBE_TMPL_PAIR_DATE_RESULT_READY:}
      tmpl-invite-new-participant: ${WECHAT_SUBSCRIBE_TMPL_INVITE_NEW_PARTICIPANT:}
      tmpl-invite-match-found: ${WECHAT_SUBSCRIBE_TMPL_INVITE_MATCH_FOUND:}
      page-pair-date-result-ready: ${WECHAT_SUBSCRIBE_PAGE_PAIR_DATE_RESULT_READY:pages/moment/result/result}
      page-invite-new-participant: ${WECHAT_SUBSCRIBE_PAGE_INVITE_NEW_PARTICIPANT:pages/invite/index/index}
      page-invite-match-found: ${WECHAT_SUBSCRIBE_PAGE_INVITE_MATCH_FOUND:pages/invite/wait/wait}
      data-key-title: ${WECHAT_SUBSCRIBE_DATA_KEY_TITLE:thing1}
      data-key-time: ${WECHAT_SUBSCRIBE_DATA_KEY_TIME:time2}
      data-key-remark: ${WECHAT_SUBSCRIBE_DATA_KEY_REMARK:thing3}

ai:
  api-key: ${AI_API_KEY:}
  base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  model: ${AI_MODEL:qwen3-max}
  max-tokens: ${AI_MAX_TOKENS:4096}
  timeout-seconds: ${AI_TIMEOUT:90}
  # 默认 1 小时：与 AiConfig 一致；0=每次调 AI 不用缓存；设为 0 需显式 YUANFEN_COOLDOWN=0
  yuanfen-cooldown-hours: ${YUANFEN_COOLDOWN:1}
  # 缘分解析单独 max_tokens（≤ max-tokens，适当降低可加快出文；过小可能导致 JSON 截断）
  yuanfen-max-tokens: ${YUANFEN_MAX_TOKENS:3072}
  # 缘分解析 HTTP 超时（秒），需与前端 YUANFEN_REQUEST_TIMEOUT_SEC 一致思路
  yuanfen-timeout-seconds: ${YUANFEN_TIMEOUT:60}
  # 同对用户进行中锁 TTL（秒），防并发连点
  yuanfen-inflight-ttl-seconds: ${YUANFEN_INFLIGHT_TTL:120}
  # 每用户滑动窗口内最多「发起 AI」次数（缓存命中不计）；防取消再点刷接口
  yuanfen-start-burst-max: ${YUANFEN_START_BURST_MAX:8}
  yuanfen-start-burst-window-seconds: ${YUANFEN_START_BURST_WINDOW:900}
  # 全站当前小时「真实调 AI」缘分次数上限（上海时区整点小时，Redis）；0=不限制
  yuanfen-global-ai-hourly-max: ${YUANFEN_GLOBAL_AI_HOURLY_MAX:0}
  # ---------- 火山方舟图生图（AI 头像工作室，与 ARK_* 环境变量对应）----------
  ark-api-key: ${ARK_API_KEY:}
  ark-base-url: ${ARK_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
  ark-image-model: ${ARK_IMAGE_MODEL:doubao-seedream-5-0-260128}
  avatar-studio-free-quota: ${AVATAR_STUDIO_FREE_QUOTA:2}
  avatar-studio-timeout-seconds: ${AVATAR_STUDIO_TIMEOUT_SECONDS:180}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
