# 本地开发配置：无需设置环境变量即可启动
# 使用方式：mvn spring-boot:run -Dspring-boot.run.profiles=dev
# 或设置环境变量 SPRING_PROFILES_ACTIVE=dev

spring:
  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:campus123}
  mail:
    username: ${MAIL_USERNAME:dev@example.com}
    password: ${MAIL_PASSWORD:dev}
    from: ${MAIL_FROM:dev@example.com}

app:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-must-be-at-least-32-bytes-long}
  security:
    enforce-secrets: false

ai:
  api-key: ${AI_API_KEY:sk-dev-placeholder}
