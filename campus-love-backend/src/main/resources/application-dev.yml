# 本地开发配置：无需设置环境变量即可启动
# 使用方式：mvn spring-boot:run -Dspring-boot.run.profiles=dev
# 或设置环境变量 SPRING_PROFILES_ACTIVE=dev

spring:
  datasource:
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  mail:
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:}

app:
  jwt:
    secret: ${JWT_SECRET:}
  security:
    enforce-secrets: false

ai:
  api-key: ${AI_API_KEY:}
